# .github/workflows/build.yml

name: Build Flutter App

# Déclenche le build sur push ou pull request
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Permet de lancer manuellement
  workflow_dispatch:

jobs:
  # =============================================
  #          BUILD ANDROID APK
  # =============================================
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurer Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Configurer Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      # 4. Installer les dépendances
      - name: Install dependencies
        run: flutter pub get

      # 5. Analyser le code
      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      # 6. Build APK Release
      - name: Build APK
        run: flutter build apk --release

      # 7. Build App Bundle (pour Play Store)
      - name: Build App Bundle
        run: flutter build appbundle --release

      # 8. Upload APK en artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # 9. Upload AAB en artifact
      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # =============================================
  #          BUILD iOS (sur macOS)
  # =============================================
  build-ios:
    name: 🍎 Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
          retention-days: 30

  # =============================================
  #          BUILD WEB
  # =============================================
  build-web:
    name: 🌐 Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 30